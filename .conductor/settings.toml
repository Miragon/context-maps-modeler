"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
setup = "npm install"
run_mode = "concurrent"

[scripts.run.webapp]
command = "npm run dev:webapp"
icon = "globe"

[scripts.run.vscode]
command = "npm run dev:vscode"
icon = "code"

[scripts.run.test]
command = "npm test"
icon = "test-tube"
